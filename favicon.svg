<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
    <!-- Nucleus -->
    <circle cx="50" cy="50" r="10" fill="#39ff14" />
    
    <!-- Orbit 1 (Horizontal) -->
    <ellipse cx="50" cy="50" rx="42" ry="14" fill="none" stroke="#00e5ff" stroke-width="4" transform="rotate(0 50 50)" />
    <!-- Electron 1 -->
    <circle cx="92" cy="50" r="5" fill="#39ff14" />

    <!-- Orbit 2 (Diagonal Right) -->
    <ellipse cx="50" cy="50" rx="42" ry="14" fill="none" stroke="#00e5ff" stroke-width="4" transform="rotate(60 50 50)" />
    <!-- Electron 2 -->
    <circle cx="50" cy="8" r="5" fill="#39ff14" transform="rotate(60 50 50)" />

    <!-- Orbit 3 (Diagonal Left) -->
    <ellipse cx="50" cy="50" rx="42" ry="14" fill="none" stroke="#00e5ff" stroke-width="4" transform="rotate(120 50 50)" />
    <!-- Electron 3 -->
    <circle cx="92" cy="50" r="5" fill="#39ff14" transform="rotate(120 50 50)" />
</svg>
